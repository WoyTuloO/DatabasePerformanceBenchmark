spring.application.name=performanceTesting
debug=true
spring.threads.virtual.enabled=true

# Virtual Threads Configuration - maximized for high concurrency
server.tomcat.threads.max=10000
server.tomcat.threads.min-spare=100
server.tomcat.max-connections=20000
server.tomcat.accept-count=1000

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/performance_test
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool - optimized for virtual threads
spring.datasource.hikari.connection-init-sql=SET search_path TO shop,public
spring.datasource.hikari.maximum-pool-size=200
spring.datasource.hikari.minimum-idle=50
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# PostgreSQL + Hibernate ORM (JPA)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
